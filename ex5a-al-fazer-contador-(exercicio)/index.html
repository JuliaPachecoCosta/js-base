 <!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Exercício 5A - Contador</title>
</head>
<body>

    <button id="Contador">Clique aqui</button>
    <p id="paragrafo">Contador: 0</p>

    <script>
        let contador = 0;

        const botao = document.querySelector('#Contador');
        const paragrafo = document.querySelector('#paragrafo');

        botao.addEventListener("click", () => {
            contador++;
            paragrafo.textContent = "Contador: " + contador;

            if (contador % 2 === 0) {
                paragrafo.style.backgroundColor = "green";
            } else {
                paragrafo.style.backgroundColor = "red";
            }
        });
    </script>

</body>
</html>
